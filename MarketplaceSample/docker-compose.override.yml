services:
  yarp.loadbalancer:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"

  marketplacesample.api1:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnectionString=Host=marketplace.db;Port=5432;Database=marketplacesampledb;Username=postgres;Password=1
    ports:
      - "8081:8080"

  marketplacesample.api2:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnectionString=Host=marketplace.db;Port=5432;Database=marketplacesampledb;Username=postgres;Password=1
    ports:
      - "8082:8080"

  marketplacesample.api3:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnectionString=Host=marketplace.db;Port=5432;Database=marketplacesampledb;Username=postgres;Password=1
    ports:
      - "8083:8080"

  marketplace.db:
    environment:
      - POSTGRES_DB=marketplacesampledb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1
    ports:
      - "5432:5432"
    volumes:
      - marketplace-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplacesampledb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  marketplace-postgres-data:
